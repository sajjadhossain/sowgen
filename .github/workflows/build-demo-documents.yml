name: Build Demo Documents

on:
  workflow_dispatch:

jobs:
  build-demo-documents:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build demo Markdown and PDF files
        run: python -m src.sow_generator.cli.generate_demo_documents --clean

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-documents
          path: |
            demos/md/*.md
            demos/pdf/*.pdf
