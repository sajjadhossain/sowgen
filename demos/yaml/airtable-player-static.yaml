  name: "Hugging Trees Airtable Player Modernization"
  client: "Hugging Trees"
  start_date: "2026-04-01"
  end_date: "2026-07-31"
  description: "Rebuild and fine-tune the existing Airtable-driven static media experience as a React application with a custom Airtable wrapper, configurable UI behavior, cross-platform developer workflows, automated tests, and maintainable contributor documentation."

