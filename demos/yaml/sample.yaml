kanban:
  description: "This project will follow a Kanban workflow tuned for a small development team."
  columns:
    - key: "Backlog"
      description: "All approved work items waiting to be prioritized for delivery."
    - key: "Ready"
      description: "Work that is refined, sized, and ready for the team to pull."
    - key: "In Progress"
      description: "Items actively being designed, built, or tested."
    - key: "Review"
      description: "Completed work awaiting stakeholder, QA, or peer review."
    - key: "Done"
      description: "Work that has passed validation and is accepted as complete."
  principles:
    - key: "Visualize workflow"
      description: "Make the current state of work visible so blockers and handoffs are easy to spot."
    - key: "Limit work in progress (WIP)"
      description: "Reduce multitasking so the team can finish work faster and with better focus."
    - key: "Manage flow and reduce handoff delays"
      description: "Track movement across the board and resolve bottlenecks before they grow."
    - key: "Make process policies explicit"
      description: "Document entry, exit, and quality expectations for each stage of delivery."
    - key: "Use feedback loops to refine delivery"
      description: "Review outcomes regularly and adjust process based on what the team learns."
    - key: "Improve collaboratively and continuously"
      description: "Encourage small, shared process improvements throughout the engagement."

user_stories:
  - id: "US-001"
    title: "User Authentication"
    as_a: "registered user"
    i_want: "to log in to the application"
    so_that: "I can access my personal dashboard"
    acceptance_criteria:
      - "User can enter username and password"
      - "System validates credentials"
      - "User is redirected to dashboard on success"
      - "Error message shown on invalid credentials"
    estimate: 8
    priority: "High"

  - id: "US-002"
    title: "Create Task"
    as_a: "team member"
    i_want: "to create a new task"
    so_that: "I can track work items"
    acceptance_criteria:
      - "User can access task creation form"
      - "Required fields: title, description, assignee, priority"
      - "Task appears in backlog after creation"
      - "Notification sent to assignee"
    estimate: 5
    priority: "High"

  - id: "US-003"
    title: "Move Task on Kanban Board"
    as_a: "team member"
    i_want: "to move tasks between columns"
    so_that: "I can update task status"
    acceptance_criteria:
      - "User can drag and drop tasks between columns"
      - "Task status updates automatically"
      - "Changes are saved and visible to all team members"
      - "Audit trail maintained for status changes"
    estimate: 3
    priority: "Medium"

  - id: "US-004"
    title: "View Project Reports"
    as_a: "project manager"
    i_want: "to view project progress reports"
    so_that: "I can track team performance"
    acceptance_criteria:
      - "Reports show tasks by status"
      - "Burndown chart displays progress"
      - "Team velocity metrics calculated"
      - "Reports can be exported to PDF"
    estimate: 10
    priority: "Medium"

deliverables:
  - id: "D-01"
    name: "Functional web application"
    description: "The deployed task management product with authentication, task workflows, and reporting enabled."
    access_details: "Users will access the application through the production URL using their assigned credentials."
  - id: "D-02"
    name: "User documentation"
    description: "End-user guides covering login, task creation, Kanban workflows, and report usage."
    access_details: "The client will receive a shareable documentation link and downloadable PDF copies."
  - id: "D-03"
    name: "Technical documentation"
    description: "Implementation notes, architecture references, and support handoff material for administrators."
    access_details: "The delivery team will publish this in the shared project repository and handoff workspace."
  - id: "D-04"
    name: "Test suite with 80%+ coverage"
    description: "Automated test assets and execution guidance supporting ongoing regression validation."
    access_details: "Engineers will access the test suite from the source repository and CI pipeline dashboard."
  - id: "D-05"
    name: "Deployment scripts"
    description: "Environment setup and release scripts used to deploy the application consistently."
    access_details: "Operations staff will receive these scripts in the project repository with runbook instructions."

milestones:
  - name: "Sprint 1 Completion"
    due_date: "2026-04-15"
    deliverables:
      - "User authentication implemented"
      - "Basic task creation functionality"
      - "Initial Kanban board layout"

  - name: "Sprint 2 Completion"
    due_date: "2026-05-01"
    deliverables:
      - "Full Kanban board functionality"
      - "User role management"
      - "Basic reporting features"

  - name: "Final Delivery"
    due_date: "2026-06-30"
    deliverables:
      - "Complete application"
      - "All documentation"
      - "Production deployment"
      - "User training materials"

pricing:
  hourly_rate: 75.00
  overhead: 0.25  # 25% overhead
  profit_margin: 0.20  # 20% profit margin

assumptions_and_constraints:
  - id: "A-01"
    summary: "Team members have the required skills and tool access."
    mitigation: "Confirm staffing and environment readiness before kickoff and replace gaps quickly if constraints emerge."
  - id: "A-02"
    summary: "Client feedback and approvals are provided within agreed review windows."
    mitigation: "Use scheduled review checkpoints and escalation paths when feedback is delayed."
  - id: "A-03"
    summary: "Material scope changes are managed through a formal change request."
    mitigation: "Track scope deltas in the backlog and re-estimate before accepting new work."
  - id: "A-04"
    summary: "Standard development, testing, and deployment environments are available."
    mitigation: "Validate access and deployment prerequisites during project setup and at each release gate."

risk_management:
  - id: "R-01"
    summary: "Review work in progress regularly to surface blockers early."
    mitigation: "Inspect the board frequently and escalate blocked items before they affect milestone dates."
  - id: "R-02"
    summary: "Validate changes continuously with automated and manual testing."
    mitigation: "Run acceptance checks throughout delivery and address quality regressions as they appear."
  - id: "R-03"
    summary: "Adjust backlog priority as new information emerges during delivery."
    mitigation: "Re-rank upcoming work during reviews so the team stays aligned to the highest-value outcomes."
